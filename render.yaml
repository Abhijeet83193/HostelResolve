services:
  - type: web
    name: hostelresolve-backend
    env: node
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: web
    name: hostelresolve-frontend
    env: static
    region: singapore
    buildCommand: npm install && npm run build
    buildDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://hostelresolve-backend.onrender.com